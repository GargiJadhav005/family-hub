services:
  - type: web
    name: family-hub-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend

    # Build & start
    buildCommand: npm install
    startCommand: node src/server.js

    # Environment variables (set sensitive values in Render Dashboard)
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: family_hub
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false

    # Health check
    healthCheckPath: /api/health

    # Auto-deploy from GitHub
    autoDeploy: true
