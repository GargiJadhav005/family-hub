services:
  - type: web
    name: family-hub-backend
    env: node
    region: oregon
    plan: free
    
    # Build configuration
    buildCommand: "cd backend && npm install && npm run build"
    startCommand: "cd backend && npm start"
    
    # Environment variables (sensitive values set in Render Dashboard)
    envVars:
      - key: NODE_ENV
        value: production
    
    # Health check
    healthCheckPath: /api/health
    
    # Auto-deploy from GitHub
    repo: https://github.com/your-username/family-hub
    branch: main
    autoDeploy: true
